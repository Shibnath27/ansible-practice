---
- name: Configure web servers
  hosts: web
  become: true
  roles:
    - role: webserver
      vars:
        app_name: terraweek
        http_port: 80

- name: Configure app servers with Docker
  hosts: app
  become: true
  tasks:
    - name: Install Docker
      dnf:
        name: docker
        state: present
    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: true
    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

- name: Configure database servers
  hosts: db
  become: true
  tasks:
    - name: Create DB config with secrets
      template:
        src: ../templates/db-config.j2
        dest: /etc/db-config.env
        owner: root
        mode: '0600'

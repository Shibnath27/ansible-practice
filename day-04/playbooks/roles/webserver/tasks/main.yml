---
# tasks file for roles/webserver
- name: Install Nginx
  yum:
    name: nginx
    state: present

- name: Deploy nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: Restart Nginx

- name: Deploy vhost
  template:
    src: vhost.conf.j2
    dest: "/etc/nginx/conf.d/{{ app_name }}.conf"
  notify: Restart Nginx

- name: Create web root
  file:
    path: "/var/www/{{ app_name }}"
    state: directory

- name: Deploy index
  template:
    src: index.html.j2
    dest: "/var/www/{{ app_name }}/index.html"

- name: Start nginx
  service:
    name: nginx
    state: started
    enabled: true
